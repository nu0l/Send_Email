<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Email Web Console</title>
    <style>
        :root {
            --bg-top: #0f172a;
            --bg-mid: #1e293b;
            --surface: #ffffff;
            --surface-muted: #f8fafc;
            --text: #0f172a;
            --muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --ok: #059669;
            --error: #dc2626;
            --radius: 14px;
            --shadow: 0 4px 24px rgba(15, 23, 42, 0.08);
            --shadow-card: 0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 38%, #e2e8f0 38%, #f1f5f9 100%);
            min-height: 100vh;
            color: var(--text);
        }

        .shell {
            max-width: 1120px;
            margin: 0 auto;
            padding: 28px 20px 48px;
        }

        .hero {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.95) 0%, rgba(79, 70, 229, 0.92) 100%);
            color: #fff;
            border-radius: var(--radius);
            padding: 28px 32px;
            margin-bottom: 22px;
            box-shadow: var(--shadow-card);
        }
        .hero h1 {
            margin: 0 0 8px;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .hero p {
            margin: 0;
            opacity: 0.92;
            font-size: 0.95rem;
            line-height: 1.55;
            max-width: 640px;
        }
        .hero-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 16px;
        }
        .hero-badge {
            background: rgba(255,255,255,0.18);
            border-radius: 999px;
            padding: 6px 12px;
            font-size: 12px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 18px;
            box-shadow: var(--shadow-card);
        }
        .card.compact { padding: 14px 18px; }

        h2 {
            margin: 0 0 14px;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text);
        }
        label, .hint { color: var(--muted); font-size: 13px; display: block; margin-bottom: 6px; }
        .hint { margin-top: 8px; margin-bottom: 0; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 14px;
        }

        .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

        input, textarea, select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            background: var(--surface);
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
        }
        textarea { min-height: 120px; resize: vertical; }

        button, .btn-link {
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.05s;
            background: var(--primary);
            color: #fff;
        }
        button:hover { background: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        button.secondary:hover { background: #334155; }
        button.danger:hover { background: #991b1b; }
        button.ghost:hover { background: #e2e8f0; }
        button.tab:hover {
            background: var(--surface-muted);
            border-color: var(--primary);
            color: var(--primary);
        }
        button.tab.active:hover {
            background: var(--primary-hover);
            color: #fff;
            border-color: var(--primary-hover);
        }
        button.secondary { background: #475569; color: #fff; }
        button.danger { background: #b91c1c; color: #fff; }
        button.ghost {
            background: var(--surface-muted);
            color: var(--text);
            border: 1px solid var(--border);
        }
        button.tab {
            background: var(--surface-muted);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 999px;
        }
        button.tab.active {
            background: var(--primary);
            color: #fff;
            border-color: var(--primary);
        }

        .tab-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .pane { display: none !important; animation: fadeIn 0.2s ease; }
        .pane.active { display: block !important; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .inner-card {
            background: var(--surface-muted);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            margin-top: 12px;
        }

        #status {
            white-space: pre-wrap;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 12px;
            padding: 14px 16px;
            max-height: 280px;
            overflow: auto;
            font-size: 12px;
            font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
            line-height: 1.45;
        }
        #status.success { box-shadow: inset 0 0 0 1px rgba(5, 150, 105, 0.35); }
        #status.error { box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.45); }

        code.inline {
            background: #e2e8f0;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 12px;
        }

        .toolbar-log {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            background: #475569;
            color: #fff !important;
        }
        .btn-link:hover { background: #334155; }

        @media (max-width: 600px) {
            .hero { padding: 22px; }
            .shell { padding: 16px 12px 32px; }
        }
    </style>
</head>
<body>
<div class="shell">
    <header class="hero">
        <h1>Send Email Web Console</h1>
        <p>在同一页面完成邮箱配置、代理、附件与模板文件管理、普通发送、模板群发及 EML 转 HTML。界面采用卡片分区，便于按步骤操作。</p>
        <div class="hero-badges">
            <span class="hero-badge">浏览器会话登录（Cookie）</span>
            <span class="hero-badge">多账户轮询发送</span>
            <span class="hero-badge">Thymeleaf 模板 + CSV</span>
            <span class="hero-badge">发送统计 · 演练模板</span>
        </div>
        <div class="session-bar" style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;margin-top:18px;padding-top:16px;border-top:1px solid rgba(255,255,255,.25);">
            <span id="sessionUser" style="font-size:14px;opacity:.95;">载入中…</span>
            <div class="row" style="gap:10px;">
                <a class="btn-link" href="1213300000/swagger-ui.html" target="_blank" rel="noopener" style="font-size:13px;padding:8px 14px;">Swagger UI</a>
                <form method="post" action="logout" style="margin:0;">
                    <button type="submit" style="border:none;border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.35);font-weight:500;">退出登录</button>
                </form>
            </div>
        </div>
    </header>

    <section class="card compact">
        <h2 style="margin-bottom:10px;">功能模块</h2>
        <div class="tab-bar" id="tabs" role="tablist"></div>
    </section>

    <div id="panes"></div>

    <section class="card" aria-labelledby="log-title">
        <div class="toolbar-log">
            <h2 id="log-title" style="margin:0;">操作日志</h2>
            <button type="button" class="ghost" onclick="clearLog()">清空日志</button>
        </div>
        <div id="status" class="success" role="log" aria-live="polite">等待操作…</div>
    </section>
</div>

<script>
(function () {
    var el = document.getElementById('sessionUser');
    var p = window.location.pathname || '/';
    var dir = p.lastIndexOf('/') >= 0 ? p.slice(0, p.lastIndexOf('/') + 1) : '/';
    var src = dir + 'js/web-console.js?v=6';
    if (el) el.textContent = '正在加载控制台脚本…';
    window.__webConsoleScriptSrc = src;
    document.write('<script src="' + src.replace(/"/g, '') + '"><\/script>');
})();
</script>
<script>
(function () {
    // 移除“initApp 是否存在”的瞬时检查，避免因加载时序导致误报。
})();
</script>
</body>
</html>
