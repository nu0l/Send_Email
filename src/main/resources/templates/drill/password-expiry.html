<!DOCTYPE html>
<html>
<body style="margin:0;padding:16px;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;line-height:1.65;color:#0f172a;">
<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:12px 14px;margin-bottom:16px;">
    <strong>【授权安全意识演练】</strong> 本邮件仅用于经授权的安全演练。禁止用于未授权测试。
</div>
<p>尊敬的 <span th:text="${userName}">姓名</span>（工号 <span th:text="${workNo}">工号</span>）：</p>
<p>根据 <span th:text="${companyName}">公司</span> 信息安全策略，请定期更新您的账户密码，并避免在多个系统复用同一密码。</p>
<p><strong>建议操作：</strong></p>
<ol style="padding-left:20px;">
    <li>登录官方密码自助平台修改密码；</li>
    <li>新密码长度与复杂度需符合公司规定；</li>
    <li>勿向他人泄露验证码或密码。</li>
</ol>
<p style="color:#64748b;font-size:12px;margin-top:24px;">演练模板 — 请替换为真实政策链接与支持渠道。</p>
</body>
</html>
