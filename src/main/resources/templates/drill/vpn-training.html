<!DOCTYPE html>
<html>
<body style="margin:0;padding:16px;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;line-height:1.65;color:#0f172a;">
<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:12px 14px;margin-bottom:16px;">
    <strong>【授权安全意识演练】</strong> 本邮件仅用于经授权的安全演练。链接请替换为组织内合法地址。
</div>
<p>尊敬的 <span th:text="${userName}">姓名</span>（工号 <span th:text="${workNo}">工号</span>）：</p>
<p>为保障 <span th:text="${companyName}">公司</span> 远程访问安全，请通过公司批准的 VPN 客户端连接内网资源。</p>
<p><strong>使用前请确认：</strong></p>
<ul style="padding-left:20px;">
    <li>客户端来源为 IT 发布的官方渠道；</li>
    <li>连接失败时勿向陌生“技术支持”提供密码；</li>
    <li>使用完毕后及时断开 VPN。</li>
</ul>
<p style="color:#64748b;font-size:12px;margin-top:24px;">演练模板 — 下载链接与客服电话请改为真实信息。</p>
</body>
</html>
