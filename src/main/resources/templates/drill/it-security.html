<!DOCTYPE html>
<html>
<body style="margin:0;padding:16px;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;font-size:14px;line-height:1.65;color:#0f172a;">
<div style="background:#fef3c7;border:1px solid #f59e0b;border-radius:8px;padding:12px 14px;margin-bottom:16px;">
    <strong>【授权安全意识演练】</strong> 本邮件仅用于经授权的安全演练与培训。禁止用于欺诈、未授权测试或任何违法用途。
</div>
<p>尊敬的 <span th:text="${userName}">姓名</span>（工号 <span th:text="${workNo}">工号</span>），您好：</p>
<p><span th:text="${companyName}">公司</span> IT 部门提醒您：请确保办公设备已安装最新安全补丁，并勿在不可信网络环境下处理敏感信息。</p>
<ul style="padding-left:20px;">
    <li>及时更新操作系统与浏览器；</li>
    <li>勿点击来源不明的链接或附件；</li>
    <li>发现异常请通过官方渠道联系 IT 支持。</li>
</ul>
<p style="color:#64748b;font-size:12px;margin-top:24px;">本邮件为演练模板，请按组织流程替换为真实联系方式与政策链接。</p>
</body>
</html>
